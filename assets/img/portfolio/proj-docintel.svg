<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Roboto', 'Segoe UI', sans-serif">
  <rect width="800" height="500" fill="#0f0f0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e1e1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#grid)"/>
  <rect x="0" y="0" width="800" height="3" fill="#18d26e"/>
  <!-- doc icon -->
  <rect x="100" y="140" width="110" height="140" rx="6" fill="#1a1a1a" stroke="#18d26e" stroke-width="1.5"/>
  <rect x="115" y="165" width="80" height="6" rx="3" fill="#18d26e" fill-opacity="0.6"/>
  <rect x="115" y="182" width="65" height="6" rx="3" fill="#444"/>
  <rect x="115" y="199" width="72" height="6" rx="3" fill="#444"/>
  <rect x="115" y="216" width="58" height="6" rx="3" fill="#444"/>
  <rect x="115" y="233" width="75" height="6" rx="3" fill="#444"/>
  <text x="155" y="295" text-anchor="middle" fill="#666" font-size="11">PDF / DOCX</text>
  <!-- arrow -->
  <line x1="215" y1="210" x2="290" y2="210" stroke="#18d26e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="290,205 302,210 290,215" fill="#18d26e"/>
  <!-- features box -->
  <rect x="305" y="130" width="200" height="165" rx="8" fill="#1a1a1a" stroke="#18d26e" stroke-width="1.5"/>
  <text x="405" y="158" text-anchor="middle" fill="#18d26e" font-size="13" font-weight="600">Llama 3.1 8B</text>
  <text x="405" y="175" text-anchor="middle" fill="#555" font-size="10">via Ollama · local · zero API</text>
  <line x1="320" y1="185" x2="490" y2="185" stroke="#2a2a2a" stroke-width="1"/>
  <text x="325" y="203" fill="#ccc" font-size="11">→ Q&amp;A + citations</text>
  <text x="325" y="222" fill="#ccc" font-size="11">→ Summarization</text>
  <text x="325" y="241" fill="#ccc" font-size="11">→ Entity extraction</text>
  <text x="325" y="260" fill="#ccc" font-size="11">→ Doc comparison</text>
  <text x="325" y="279" fill="#ccc" font-size="11">→ BM25 + dense + RRF</text>
  <!-- arrow -->
  <line x1="510" y1="210" x2="575" y2="210" stroke="#18d26e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="575,205 587,210 575,215" fill="#18d26e"/>
  <!-- react ui box -->
  <rect x="590" y="165" width="110" height="90" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="645" y="195" text-anchor="middle" fill="#888" font-size="11">React + Vite</text>
  <text x="645" y="212" text-anchor="middle" fill="#888" font-size="11">FastAPI</text>
  <text x="645" y="229" text-anchor="middle" fill="#888" font-size="11">PostgreSQL</text>
  <text x="645" y="246" text-anchor="middle" fill="#555" font-size="10">Full-Stack UI</text>
  <!-- title -->
  <text x="400" y="370" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="700">DocIntel</text>
  <text x="400" y="400" text-anchor="middle" fill="#888888" font-size="14">Local RAG · Document Intelligence · Zero Cloud APIs</text>
  <!-- tags -->
  <rect x="200" y="430" width="60" height="24" rx="4" fill="#18d26e" fill-opacity="0.15" stroke="#18d26e" stroke-width="1"/>
  <text x="230" y="446" text-anchor="middle" fill="#18d26e" font-size="12">Ollama</text>
  <rect x="273" y="430" width="80" height="24" rx="4" fill="#18d26e" fill-opacity="0.15" stroke="#18d26e" stroke-width="1"/>
  <text x="313" y="446" text-anchor="middle" fill="#18d26e" font-size="12">ChromaDB</text>
  <rect x="366" y="430" width="55" height="24" rx="4" fill="#18d26e" fill-opacity="0.15" stroke="#18d26e" stroke-width="1"/>
  <text x="393" y="446" text-anchor="middle" fill="#18d26e" font-size="12">BM25</text>
  <rect x="434" y="430" width="65" height="24" rx="4" fill="#18d26e" fill-opacity="0.15" stroke="#18d26e" stroke-width="1"/>
  <text x="466" y="446" text-anchor="middle" fill="#18d26e" font-size="12">FastAPI</text>
  <rect x="512" y="430" width="55" height="24" rx="4" fill="#18d26e" fill-opacity="0.15" stroke="#18d26e" stroke-width="1"/>
  <text x="539" y="446" text-anchor="middle" fill="#18d26e" font-size="12">React</text>
  <rect x="580" y="430" width="55" height="24" rx="4" fill="#18d26e" fill-opacity="0.15" stroke="#18d26e" stroke-width="1"/>
  <text x="607" y="446" text-anchor="middle" fill="#18d26e" font-size="12">spaCy</text>
</svg>
